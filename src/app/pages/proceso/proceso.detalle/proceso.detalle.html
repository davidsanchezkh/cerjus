<div class="container">
    <div class="row justify-content-center">

        <div class="col-12 col-lg-8 mb-4">
            <div class="card shadow-sm">

                <div
                class="card-header d-flex justify-content-between align-items-center selectable-fix"
                (click)="open = !open"
                role="button"
                [attr.aria-expanded]="open">

                <div class="d-flex align-items-center gap-2">
                    <span class="fw-semibold" style="min-width: 220px; display: inline-block;">
                    Información del proceso
                    </span>

                    <button
                    type="button"
                    class="btn btn-secondary"
                    (click)="onEdit($event)"
                    [disabled]="isEditing || submitting">
                    Editar
                    </button>
                </div>

                <span class="caret">{{ open ? "▴" : "▾" }}</span>
                </div>

                <form
                class="card-body selectable-fix"
                [hidden]="!open"
                [formGroup]="form"
                [class.was-validated]="submitting">

                <div class="row g-3">
                    <div class="col-12 col-md-4">
                    <label class="form-label">DNI ciudadano</label>
                    <input
                        type="text"
                        formControlName="dni"
                        class="value-box-noedit">
                    </div>
                </div>

                <div style="height: 1rem;"></div>

                <div class="row g-3">
                    <div class="col-12">
                    <label class="form-label">Asesor inicial</label>
                    <input
                        type="text"
                        formControlName="asesorInicialNombre"
                        class="value-box-noedit">
                    </div>
                </div>

                <div style="height: 1rem;"></div>

                <div class="row g-3">
                    <div class="col-12">
                    <label class="form-label">Asesor en curso</label>

                    <div class="asesor-row">
                        <input
                        type="text"
                        formControlName="asesorActualNombre"
                        class="value-box-noedit asesor-input">

                        <button
                        type="button"
                        class="btn btn-outline-primary asesor-btn"
                        (click)="onAsignarmeAsesor($event)"
                        [disabled]="!isEditing || assigning || submitting">
                        @if (assigning) {
                            Asignando…
                        } @else {
                            Asignarme
                        }
                        </button>
                    </div>
                    </div>
                </div>

                <div style="height: 1rem;"></div>

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                    <label class="form-label">Número de expediente</label>
                    <input
                        type="text"
                        maxlength="50"
                        formControlName="numeroExpediente"
                        [class.value-box-edit]="isEditing"
                        [class.value-box-noedit]="!isEditing">
                    </div>

                    <div class="col-12 col-md-6">
                    <label class="form-label">Sede</label>
                    <input
                        type="text"
                        maxlength="100"
                        formControlName="sede"
                        [class.value-box-edit]="isEditing"
                        [class.value-box-noedit]="!isEditing">
                    </div>
                </div>

                <div style="height: 1rem;"></div>

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                    <label class="form-label">Parte</label>
                    <input
                        type="text"
                        maxlength="150"
                        formControlName="parte"
                        [class.value-box-edit]="isEditing"
                        [class.value-box-noedit]="!isEditing">
                    </div>

                    <div class="col-12 col-md-6">
                    <label class="form-label">Materia</label>
                    <input
                        type="text"
                        maxlength="150"
                        formControlName="materia"
                        [class.value-box-edit]="isEditing"
                        [class.value-box-noedit]="!isEditing">
                    </div>
                </div>

                <div style="height: 1rem;"></div>

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                    <label class="form-label">Demandante</label>
                    <input
                        type="text"
                        maxlength="150"
                        formControlName="demandante"
                        class="value-box-noedit">
                    </div>

                    <div class="col-12 col-md-6">
                    <label class="form-label">Demandado</label>
                    <input
                        type="text"
                        maxlength="150"
                        formControlName="demandado"
                        [class.value-box-edit]="isEditing"
                        [class.value-box-noedit]="!isEditing">
                    </div>
                </div>

                <div style="height: 1rem;"></div>

                <div class="row g-3">
                    <div class="col-12">
                    <label class="form-label">Estado procesal</label>
                    <input
                        type="text"
                        maxlength="80"
                        formControlName="estadoProcesal"
                        [class.value-box-edit]="isEditing"
                        [class.value-box-noedit]="!isEditing">
                    </div>
                </div>

                <div style="height: 1rem;"></div>

                <div class="row g-3">
                    <div class="col-12">
                    <label class="form-label">Observación</label>
                    <textarea
                        rows="3"
                        maxlength="600"
                        formControlName="observacion"
                        [class.value-box-edit]="isEditing"
                        [class.value-box-noedit]="!isEditing">
                    </textarea>
                    </div>
                </div>

                <div style="height: 1rem;"></div>

                <hr class="my-3">

                <div class="section-title">Información de registro</div>

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                    <label class="form-label">Registrado por</label>
                    <input
                        type="text"
                        [value]="creadoPorNombre || '—'"
                        class="value-box-noedit"
                        readonly>
                    </div>

                    <div class="col-12 col-md-3">
                    <label class="form-label">DNI</label>
                    <input
                        type="text"
                        [value]="creadoPorDni || '—'"
                        class="value-box-noedit"
                        readonly>
                    </div>

                    <div class="col-12 col-md-3">
                    <label class="form-label">Fecha sistema</label>
                    <input
                        type="text"
                        [value]="fechaCreadoPor ? (fechaCreadoPor | date:'yyyy-MM-dd HH:mm') : '—'"
                        class="value-box-noedit"
                        readonly>
                    </div>
                </div>

                <div style="height: 1rem;"></div>

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                    <label class="form-label">Última actualización por</label>
                    <input
                        type="text"
                        [value]="modificadoPorNombre || '—'"
                        class="value-box-noedit"
                        readonly>
                    </div>

                    <div class="col-12 col-md-3">
                    <label class="form-label">DNI</label>
                    <input
                        type="text"
                        [value]="modificadoPorDni || '—'"
                        class="value-box-noedit"
                        readonly>
                    </div>

                    <div class="col-12 col-md-3">
                    <label class="form-label">Fecha sistema</label>
                    <input
                        type="text"
                        [value]="fechaModificadoPor ? (fechaModificadoPor | date:'yyyy-MM-dd HH:mm') : '—'"
                        class="value-box-noedit"
                        readonly>
                    </div>
                </div>

                <div style="height: 1rem;"></div>

                @if (isEditing) {
                    <div class="d-flex justify-content-between mt-4">
                    <button
                        type="button"
                        class="btn btn-warning"
                        (click)="onCancel()"
                        [disabled]="submitting || assigning">
                        Cancelar
                    </button>

                    <button
                        type="button"
                        class="btn btn-success"
                        (click)="onSave()"
                        [disabled]="submitting || assigning">
                        @if (submitting) {
                        Guardando…
                        } @else {
                        Guardar
                        }
                    </button>
                    </div>
                }

                </form>
            </div>
        </div>

    </div>
</div>
