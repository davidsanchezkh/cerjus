<div class="container">
  <div class="row justify-content-center">
    <!-- PANEL 1: Información de la consulta -->
    <div class="col-12 col-lg-8 mb-4">
      <div class="card shadow-sm">

        <!-- Encabezado colapsable -->
        <div
          class="card-header d-flex justify-content-between align-items-center selectable-fix"
          (click)="open = !open"
          role="button"
          [attr.aria-expanded]="open">
          <div class="d-flex align-items-center gap-2">
            <span class="fw-semibold" style="min-width: 220px; display: inline-block;">Información de la consulta</span>
            <button type="button" class="btn btn-secondary" (click)="onEdit($event)">
              Editar
            </button>
          </div>
          <span class="caret">{{ open ? "▴" : "▾" }}</span>
        </div>

        <!-- Cuerpo -->
        <form class="card-body selectable-fix"
          [formGroup]="form"
          id="form1"
          name="form1"
          [hidden]="!open">

          <!-- Resumen -->
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Resumen</label>
              <input type="text"
                formControlName="resumen"
                maxlength="200"
                [class.value-box-edit]="isEditing"
                [class.value-box-noedit]="!isEditing"/>
            </div>
          </div>

          <div style="height: 1rem;"></div>

          <!-- Hechos -->
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Hechos</label>
              <textarea formControlName="hechos"
                rows="4"
                maxlength="600"
                [class.value-box-edit]="isEditing"
                [class.value-box-noedit]="!isEditing"></textarea>
            </div>
          </div>

          <div style="height: 1rem;"></div>

          <!-- Materia -->
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">Materia</label>
              <select class="form-select"
                      formControlName="materias"
                      [class.value-box-edit]="isEditing"
                      [class.value-box-noedit]="!isEditing">
                <option value="" disabled>Seleccione una materia</option>
                @for (opt of materiaOpciones; track opt.value) {
                  <option [value]="opt.value">{{ opt.label }}</option>
                }
              </select>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Especifique otros</label>
              <input
                type="text"
                maxlength="150"
                formControlName="materiaOtros"
                placeholder="Especifique la materia"
                class="form-control w-100"
                [readonly]="!isOtros || !isEditing"
                [attr.tabindex]="(!isOtros || !isEditing) ? -1 : 0"
                [class.value-box-edit]="isOtros && isEditing"
                [class.value-box-noedit]="!(isOtros && isEditing)"
              />
            </div>
          </div>

          <div style="height: 1rem;"></div>

          <!-- Lleva caso / Fecha registrada -->
          <div class="row g-3 align-items-end">
            <div class="col-12 col-md-6">
              <label class="form-label">¿Lleva el caso con nosotros?</label>
              <select class="form-select"
                formControlName="llevaCaso"
                [class.value-box-edit]="isEditing"
                [class.value-box-noedit]="!isEditing">
                @for (opt of llevaCasoOpciones; track opt.value) {
                  <option [value]="opt.value">{{ opt.label }}</option>
                }
              </select>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="coFechaRegistrada">Fecha registrada</label>
              <input
                type="date"
                id="coFechaRegistrada"
                class="form-control"
                formControlName="fechaRegistrada"
                [class.value-box-edit]="isEditing"
                [class.value-box-noedit]="!isEditing">
            </div>
          </div>

          <div style="height: 1rem;"></div>

          <!-- Absolución -->
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Absolución</label>
              <textarea formControlName="absolucion"
                rows="3"
                maxlength="600"
                [class.value-box-edit]="isEditing"
                [class.value-box-noedit]="!isEditing"></textarea>
            </div>
          </div>

          <div style="height: 1rem;"></div>

          <!-- Observaciones -->
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Observaciones</label>
              <textarea formControlName="observaciones"
                rows="2"
                maxlength="600"
                [class.value-box-edit]="isEditing"
                [class.value-box-noedit]="!isEditing"></textarea>
            </div>
          </div>

          @if (canSeeControl) {
            <div style="height: 1rem;"></div>

            <hr class="my-3">

            <div class="section-title">Información de registro</div>

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label">Registrado por</label>
                <input type="text"
                  [value]="creadoPorNombre || '—'"
                  class="value-box-noedit"
                  readonly>
              </div>

              <div class="col-12 col-md-3">
                <label class="form-label">DNI</label>
                <input type="text"
                  [value]="creadoPorDni || '—'"
                  class="value-box-noedit"
                  readonly>
              </div>

              <div class="col-12 col-md-3">
                <label class="form-label">Fecha sistema</label>
                <input type="text"
                  [value]="fechaCreadoPor ? (fechaCreadoPor | date:'yyyy-MM-dd HH:mm') : '—'"
                  class="value-box-noedit"
                  readonly>
              </div>
            </div>

            <div style="height: 1rem;"></div>

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label">Última actualización por</label>
                <input type="text"
                  [value]="modificadoPorNombre || '—'"
                  class="value-box-noedit"
                  readonly>
              </div>

              <div class="col-12 col-md-3">
                <label class="form-label">DNI</label>
                <input type="text"
                  [value]="modificadoPorDni || '—'"
                  class="value-box-noedit"
                  readonly>
              </div>

              <div class="col-12 col-md-3">
                <label class="form-label">Fecha sistema</label>
                <input type="text"
                  [value]="fechaModificadoPor ? (fechaModificadoPor | date:'yyyy-MM-dd HH:mm') : '—'"
                  class="value-box-noedit"
                  readonly>
              </div>
            </div>
          }

          <div style="height: 1rem;"></div>

          <!-- Botones -->
          @if (isEditing) {
            <div class="d-flex justify-content-between mt-4">
              <button type="button" class="btn btn-warning" (click)="onCancel()">
                Cancelar
              </button>
              <button type="button" class="btn btn-success" (click)="onSave()">
                Guardar
              </button>
            </div>
          }
        </form>
      </div>
    </div>

    <!-- PANEL 2: Seguimiento -->
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm">
        <div
          class="card-header d-flex justify-content-between align-items-center selectable-fix"
          (click)="open2 = !open2"
          role="button"
          [attr.aria-expanded]="open2">
          <div class="d-flex align-items-center gap-2">
            <span class="fw-semibold" style="min-width: 220px; display: inline-block;">Seguimiento</span>
            <button type="button" class="btn btn-secondary"
                    (click)="gotoSeguimiento(); $event.stopPropagation()">Nuevo Seguimiento</button>
          </div>
          <span class="caret">{{ open2 ? "▴" : "▾" }}</span>
        </div>

        <div class="card-body p-0 no-fouc" [hidden]="!open2">
          <app-seguimiento-lista-consulta [idconsulta]="idconsulta"></app-seguimiento-lista-consulta>
        </div>
      </div>
    </div>
  </div>
</div>
