<div class="d-flex flex-column flex-shrink-0 p-3 text-white color_azul min-vh-100" style="width: 280px; user-select: none;">
  <a class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
    <span class="fs-4">CERJUS</span>
  </a>

  <hr>

  <ul class="nav flex-column mb-auto sidebar-nav">

    <!-- GRUPO ASESORÍA -->
    @if (canSee(3)) {
      <li class="sidebar-group">
        <button
          class="w-100 d-flex justify-content-between align-items-center sidebar-group-toggle"
          type="button"
          (click)="toggleGroup('asesoria')">
          <span class="sidebar-group-title">Asesoría</span>
          <span
            class="sidebar-chevron"
            [class.sidebar-chevron-open]="openGroups.asesoria">
            &#9662;
          </span>
        </button>

        <div
          class="sidebar-submenu"
          [class.show]="openGroups.asesoria"
          [class.collapse]="true">

          <a
            class="nav-link sidebar-item-link"
            [class.active]="isAsesoriaActive('asistencia')"
            [routerLink]="['/asistencia']">
            Asistencia
          </a>

          <a
            class="nav-link sidebar-item-link"
            [class.active]="isAsesoriaActive('ciudadano')"
            [routerLink]="['/ciudadano']">
            Ciudadano
          </a>

          <a
            class="nav-link sidebar-item-link"
            [class.active]="isAsesoriaActive('consulta')"
            [routerLink]="['/consulta']">
            Consulta
          </a>

          <a
            class="nav-link sidebar-item-link"
            [class.active]="isAsesoriaActive('proceso')"
            [routerLink]="['/proceso']">
            Proceso
          </a>
        </div>
      </li>
    }

    <!-- GRUPO SUPERVISIÓN -->
    @if (canSee(3)) {
      <li class="sidebar-group">
        <button
          class="w-100 d-flex justify-content-between align-items-center sidebar-group-toggle"
          type="button"
          (click)="toggleGroup('supervision')">
          <span class="sidebar-group-title">Supervisión</span>
          <span
            class="sidebar-chevron"
            [class.sidebar-chevron-open]="openGroups.supervision">
            &#9662;
          </span>
        </button>

        <div
          class="sidebar-submenu"
          [class.show]="openGroups.supervision"
          [class.collapse]="true">

          <a
            class="nav-link sidebar-item-link"
            [class.active]="isSupervisionActive('analiticas')"
            [routerLink]="['/analiticas']">
            Analíticas
          </a>

          @if (canSee(2)) {
            <a
              class="nav-link sidebar-item-link"
              [class.active]="isSupervisionActive('controlusuario')"
              [routerLink]="['/controlusuario']">
              Asistencia
            </a>

            <a
              class="nav-link sidebar-item-link"
              [class.active]="isSupervisionActive('justificacion')"
              [routerLink]="['/justificacion/lista']">
              Justificación
            </a>
          }
        </div>
      </li>
    }

    <!-- GRUPO ADMINISTRACIÓN -->
    @if (canSee(2)) {
      <li class="sidebar-group">
        <button
          class="w-100 d-flex justify-content-between align-items-center sidebar-group-toggle"
          type="button"
          (click)="toggleGroup('admin')">
          <span class="sidebar-group-title">Administración</span>
          <span
            class="sidebar-chevron"
            [class.sidebar-chevron-open]="openGroups.admin">
            &#9662;
          </span>
        </button>

        <div
          class="sidebar-submenu"
          [class.show]="openGroups.admin"
          [class.collapse]="true">

          <a
            class="nav-link sidebar-item-link"
            [class.active]="isAdminActive('usuarios')"
            [routerLink]="['/admin/usuario/lista']">
            Usuarios
          </a>

          <a
            class="nav-link sidebar-item-link"
            [class.active]="isAdminActive('horario')"
            [routerLink]="['/horario']">
            Horario
          </a>
        </div>
      </li>
    }

  </ul>

  <hr>

  <a
    class="nav-link sidebar-item-link"
    [class.active]="isPerfilActive()"
    [routerLink]="['/cuenta/perfil']">
    Perfil
  </a>
</div>
